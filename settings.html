<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>GlovesOn | Settings</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app">

  <header class="app-header">
    <div class="app-eyebrow">GlovesOn</div>
    <h1 class="app-title">Settings</h1>
  </header>

  <div class="card">
    <div class="muted" id="summary"></div>

    <div class="stack">
      <button class="btn" onclick="location.href='settings-materials.html'">🪨 Material Presets</button>
      <button class="btn" onclick="location.href='settings-units.html'">📏 Units</button>
      <button class="btn" onclick="location.href='settings-rounding.html'">🔢 Rounding Rules</button>
      <button class="btn" onclick="location.href='settings-trucks.html'">🚛 Truck Defaults</button>
    </div>

    <hr />

    <!-- Bags toggle -->
    <button id="enableBagsRow" class="big-toggle-row" type="button" aria-pressed="false">
      <div class="big-toggle-text">
        <div class="big-toggle-title">Enable Bags (Concrete)</div>
        <div class="muted">Show bag size + bag count estimate on Calculator.</div>
      </div>
      <div id="enableBagsPill" class="big-toggle-pill off">
        <span id="enableBagsPillLabel">OFF</span>
        <span id="enableBagsPillIcon" class="big-toggle-pill-icon">✕</span>
      </div>
    </button>

    <button class="btn primary" id="saveFeaturesBtn">Save</button>

    <hr />

    <button class="btn" id="resetBtn">↺ Reset to Jobsite Defaults</button>
  </div>

</div><!-- /.app -->

<!-- NAV -->
<button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu" aria-expanded="false">
  <span></span><span></span><span></span>
</button>
<div class="nav-backdrop" id="navBackdrop"></div>
<nav class="nav-drawer" id="navDrawer" aria-label="Site navigation">
  <div class="nav-wordmark">
    <div class="nav-wordmark-name">GlovesOn</div>
    <div class="nav-wordmark-sub">Jobsite Companion</div>
  </div>
  <div class="nav-section-label">Tools</div>
  <a href="index.html"><span class="nav-icon">🏠</span> Home</a>
  <a href="calculator.html"><span class="nav-icon">🧮</span> Calculator</a>
  <a href="converter.html"><span class="nav-icon">📐</span> Converter</a>
  <a href="log.html"><span class="nav-icon">📋</span> Daily Log</a>
  <a href="notes.html"><span class="nav-icon">📝</span> Notes</a>
  <hr class="nav-divider" />
  <div class="nav-section-label">Settings</div>
  <a href="settings.html" class="active"><span class="nav-icon">⚙️</span> Settings</a>
  <a href="settings-materials.html" class="sub">Material Presets</a>
  <a href="settings-trucks.html" class="sub">Truck Defaults</a>
  <a href="settings-rounding.html" class="sub">Rounding Rules</a>
  <a href="settings-units.html" class="sub">Units</a>
  <div class="nav-footer">
    Built by <a href="https://chanceitstudio.com" target="_blank" rel="noopener">ChanceIT Studio</a>
  </div>
</nav>

<script src="store.js"></script>
<script>
const summaryEl       = document.getElementById('summary');
const resetBtn        = document.getElementById('resetBtn');
const enableBagsRow   = document.getElementById('enableBagsRow');
const enableBagsPill  = document.getElementById('enableBagsPill');
const enableBagsPillLabel = document.getElementById('enableBagsPillLabel');
const enableBagsPillIcon  = document.getElementById('enableBagsPillIcon');
const saveFeaturesBtn = document.getElementById('saveFeaturesBtn');

let enableBagsValue = false;

function renderSummary() {
  const s = GlovesOn.Settings.load();
  summaryEl.textContent =
    `Truck: ${s.trucks.defaultCapacity} yd · Loads: ${s.rounding.loadsDefault.toUpperCase()} · Thickness: ${s.units.thicknessUnit}`;
}

function loadFeaturesFromStore() {
  enableBagsValue = GlovesOn.Settings.load().features?.enableBags === true;
}

function renderFeatures() {
  enableBagsRow?.setAttribute('aria-pressed', String(enableBagsValue));
  enableBagsPill?.classList.toggle('on',  enableBagsValue);
  enableBagsPill?.classList.toggle('off', !enableBagsValue);
  if (enableBagsPillLabel) enableBagsPillLabel.textContent = enableBagsValue ? 'ON' : 'OFF';
  if (enableBagsPillIcon)  enableBagsPillIcon.textContent  = enableBagsValue ? '✓' : '✕';
}

enableBagsRow?.addEventListener('click', () => {
  enableBagsValue = !enableBagsValue;
  renderFeatures();
});

saveFeaturesBtn?.addEventListener('click', () => {
  const s = GlovesOn.Settings.load();
  if (!s.features) s.features = {};
  s.features.enableBags = enableBagsValue;
  GlovesOn.Settings.save(s);
  saveFeaturesBtn.textContent = '✓ Saved';
  setTimeout(() => { saveFeaturesBtn.textContent = 'Save'; }, 1500);
  renderFeatures();
});

resetBtn?.addEventListener('click', () => {
  if (!confirm('Reset all settings to jobsite defaults?')) return;
  GlovesOn.Settings.reset();
  loadFeaturesFromStore();
  renderSummary();
  renderFeatures();
});

function onReturnSync(fn) {
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') fn(); });
  window.addEventListener('pageshow', fn);
  window.addEventListener('storage', e => { if (e.key?.includes('gloveson')) fn(); });
}

onReturnSync(() => { renderSummary(); loadFeaturesFromStore(); renderFeatures(); });

renderSummary();
loadFeaturesFromStore();
renderFeatures();
</script>

<script>
(function() {
  const btn = document.getElementById('hamburgerBtn');
  const backdrop = document.getElementById('navBackdrop');
  const drawer   = document.getElementById('navDrawer');
  function open()  { btn.classList.add('open');    btn.setAttribute('aria-expanded','true');  backdrop.classList.add('open');    drawer.classList.add('open'); }
  function close() { btn.classList.remove('open'); btn.setAttribute('aria-expanded','false'); backdrop.classList.remove('open'); drawer.classList.remove('open'); }
  btn.addEventListener('click', () => btn.classList.contains('open') ? close() : open());
  backdrop.addEventListener('click', close);
  drawer.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
})();
</script>

</body>
</html>
