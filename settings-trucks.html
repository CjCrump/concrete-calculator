<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0c1220" />
  <title>GlovesOn | Truck Defaults</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">

  <header class="app-header">
    <div class="app-eyebrow">GlovesOn</div>
    <h1 class="app-title">Truck Defaults</h1>
  </header>

  <div class="card">
    <label>Default Truck Capacity</label>
    <div class="segmented">
      <button class="seg" data-cap="10">10 yd</button>
      <button class="seg" data-cap="9">9 yd</button>
      <button class="seg" data-cap="custom">Custom</button>
    </div>

    <div id="customWrap" class="hidden stack" style="margin-top:4px;">
      <label>Custom Capacity (yd)</label>
      <input type="number" id="customCap" inputmode="decimal" />
    </div>

    <label style="margin-top:8px;">Default Over-Order %</label>
    <input type="number" id="overOrder" inputmode="decimal" />
    <div class="muted">Buffer applied to material totals. Default: 5%</div>

    <div class="row" style="margin-top:8px;">
      <button class="toggle" id="backBtn">Back</button>
      <button class="toggle on" id="saveBtn">Save</button>
    </div>
    <div class="muted" id="status"></div>
  </div>

</div>

<button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu" aria-expanded="false"><span></span><span></span><span></span></button>
<div class="nav-backdrop" id="navBackdrop"></div>
<nav class="nav-drawer" id="navDrawer" aria-label="Site navigation">
  <div class="nav-wordmark"><div class="nav-wordmark-name">GlovesOn</div><div class="nav-wordmark-sub">Jobsite Companion</div></div>
  <div class="nav-section-label">Tools</div>
  <a href="index.html"><span class="nav-icon">🏠</span> Home</a>
  <a href="calculator.html"><span class="nav-icon">🧮</span> Calculator</a>
  <a href="converter.html"><span class="nav-icon">📐</span> Converter</a>
  <a href="log.html"><span class="nav-icon">📋</span> Daily Log</a>
  <a href="notes.html"><span class="nav-icon">📝</span> Notes</a>
  <hr class="nav-divider" />
  <div class="nav-section-label">Settings</div>
  <a href="settings.html"><span class="nav-icon">⚙️</span> Settings</a>
  <a href="settings-materials.html" class="sub">Material Presets</a>
  <a href="settings-trucks.html" class="sub active">Truck Defaults</a>
  <a href="settings-rounding.html" class="sub">Rounding Rules</a>
  <a href="settings-units.html" class="sub">Units</a>
  <div class="nav-footer">Built by <a href="https://chanceitstudio.com" target="_blank" rel="noopener">ChanceIT Studio</a></div>
</nav>

<script src="store.js"></script>
<script>
let s = GlovesOn.Settings.load();
let capMode = String(s.trucks.defaultCapacity);

function render() {
  const selected = (capMode === '9' || capMode === '10') ? capMode : 'custom';
  document.querySelectorAll('[data-cap]').forEach(b => b.classList.toggle('active', b.dataset.cap === selected));
  document.getElementById('customWrap').classList.toggle('hidden', selected !== 'custom');
  if (selected === 'custom') document.getElementById('customCap').value = (capMode === 'custom') ? '' : capMode;
  else document.getElementById('customCap').value = '';
  document.getElementById('overOrder').value = Number(s.trucks.overOrderPct ?? 5);
  document.getElementById('status').textContent = '';
}

document.querySelectorAll('[data-cap]').forEach(btn => {
  btn.addEventListener('click', () => {
    capMode = (btn.dataset.cap === 'custom') ? 'custom' : btn.dataset.cap;
    render();
  });
});

document.getElementById('saveBtn')?.addEventListener('click', () => {
  s = GlovesOn.Settings.load();
  let cap;
  if (capMode === '9' || capMode === '10') { cap = Number(capMode); }
  else { const c = Number(document.getElementById('customCap').value); cap = (c && c > 0) ? c : 10; }
  const oo = Number(document.getElementById('overOrder').value);
  s.trucks.defaultCapacity = cap;
  s.trucks.overOrderPct    = (oo >= 0) ? oo : 0;
  GlovesOn.Settings.save(s);
  document.getElementById('status').textContent = '✓ Saved.';
});

document.getElementById('backBtn')?.addEventListener('click', () => {
  window.history.length > 1 ? history.back() : (location.href = 'settings.html');
});

function onReturnSync(fn) {
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') fn(); });
  window.addEventListener('pageshow', fn);
}
onReturnSync(() => { s = GlovesOn.Settings.load(); capMode = String(s.trucks.defaultCapacity); render(); });

render();
</script>
<script>
(function() {
  const btn=document.getElementById('hamburgerBtn'),backdrop=document.getElementById('navBackdrop'),drawer=document.getElementById('navDrawer');
  function open(){btn.classList.add('open');btn.setAttribute('aria-expanded','true');backdrop.classList.add('open');drawer.classList.add('open');}
  function close(){btn.classList.remove('open');btn.setAttribute('aria-expanded','false');backdrop.classList.remove('open');drawer.classList.remove('open');}
  btn.addEventListener('click',()=>btn.classList.contains('open')?close():open());
  backdrop.addEventListener('click',close);
  drawer.querySelectorAll('a').forEach(a=>a.addEventListener('click',close));
})();
</script>
</body>
</html>
