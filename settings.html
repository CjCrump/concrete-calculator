<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Settings • Job Site Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>Settings</h1>
    </header>

    <div class="card">
      <div class="stack">
        <button class="btn" onclick="location.href='settings-materials.html'">Material Presets</button>
        <button class="btn" onclick="location.href='settings-units.html'">Units</button>
        <button class="btn" onclick="location.href='settings-rounding.html'">Rounding Rules</button>
        <button class="btn" onclick="location.href='settings-trucks.html'">Truck Defaults</button>
      </div>

     <!-- =======================================================
     FEATURE TOGGLES (Easy Mode)
     - Entire row is tappable
     - Big toggle button shows: ON / OFF (with a big X when OFF)
======================================================= -->
<button id="enableBagsRow" class="big-toggle-row" type="button" aria-pressed="false">
  <div class="big-toggle-text">
    <div class="big-toggle-title">Enable Bags (Concrete)</div>
    <div class="muted">Show bag size + bag count estimate on Calculator.</div>
  </div>

  <!-- Big pill toggle (visual only; JS updates text + state) -->
  <div id="enableBagsPill" class="big-toggle-pill off">
    <span id="enableBagsPillLabel" class="big-toggle-pill-label">OFF</span>
    <span id="enableBagsPillIcon" class="big-toggle-pill-icon">✕</span>
  </div>
</button>

<button class="btn" id="saveFeaturesBtn">Save</button>

      <hr />

      <button class="btn" id="resetBtn">Reset to Jobsite Defaults</button>
      <div class="muted" id="summary"></div>
    </div>

    <!-- HAMBURGER BUTTON -->
<button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu" aria-expanded="false">
  <span></span><span></span><span></span>
</button>
<div class="nav-backdrop" id="navBackdrop"></div>
<nav class="nav-drawer" id="navDrawer" aria-label="Site navigation">
  <div class="nav-drawer-title">Navigation</div>
  <a href="index.html" id="navCalc"><span class="nav-icon">🧮</span> Calculator</a>
  <a href="converter.html" id="navConv"><span class="nav-icon">📐</span> Converter</a>
  <hr class="nav-drawer-divider" />
  <a href="settings.html" id="navSettings"><span class="nav-icon">⚙️</span> Settings</a>
  <a href="settings-materials.html"><span class="nav-icon">🪨</span> Material Presets</a>
  <a href="settings-trucks.html"><span class="nav-icon">🚛</span> Truck Defaults</a>
  <a href="settings-rounding.html"><span class="nav-icon">🔢</span> Rounding Rules</a>
  <a href="settings-units.html"><span class="nav-icon">📏</span> Units</a>
</nav>
  </div>

  <script src="settings-store.js"></script>
  <script src="settings.js"></script>
  <script>
    document.getElementById("navSettings")?.classList.add("active");
    const _btn = document.getElementById('hamburgerBtn');
    const _backdrop = document.getElementById('navBackdrop');
    const _drawer = document.getElementById('navDrawer');
    function openNav() { _btn.classList.add('open'); _btn.setAttribute('aria-expanded','true'); _backdrop.classList.add('open'); _drawer.classList.add('open'); }
    function closeNav() { _btn.classList.remove('open'); _btn.setAttribute('aria-expanded','false'); _backdrop.classList.remove('open'); _drawer.classList.remove('open'); }
    _btn.addEventListener('click', () => _btn.classList.contains('open') ? closeNav() : openNav());
    _backdrop.addEventListener('click', closeNav);
    _drawer.querySelectorAll('a').forEach(a => a.addEventListener('click', closeNav));
  </script>
</body>
</html>
