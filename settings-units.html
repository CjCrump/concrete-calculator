<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Units • Settings</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>Units</h1>
    </header>

    <div class="card">
      <label>Length Entry</label>
      <div class="segmented">
        <button class="seg" data-length="ftin">Feet & Inches</button>
        <button class="seg" data-length="decft">Decimal Feet</button>
      </div>

      <label style="margin-top:12px;">Thickness / Depth Entry</label>
      <div class="segmented">
        <button class="seg" data-thickness="in">Inches</button>
        <button class="seg" data-thickness="ft">Feet</button>
      </div>

      <label style="margin-top:12px;">Weight Display</label>
      <div class="segmented">
        <button class="seg" data-weight="tons">Tons (US)</button>
      </div>

      <label style="margin-top:12px;">Tape Fraction Precision</label>
      <div class="segmented">
        <button class="seg" data-frac="16">1/16"</button>
        <button class="seg" data-frac="8">1/8"</button>
        <button class="seg" data-frac="4">1/4"</button>
      </div>

      <div class="row" style="margin-top:16px;">
        <button class="toggle" id="backBtn">Back</button>
        <button class="toggle on" id="saveBtn">Save</button>
      </div>

      <div class="muted" id="status" style="margin-top:10px;"></div>
    </div>

    <!-- HAMBURGER BUTTON -->
<button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu" aria-expanded="false">
  <span></span><span></span><span></span>
</button>
<div class="nav-backdrop" id="navBackdrop"></div>
<nav class="nav-drawer" id="navDrawer" aria-label="Site navigation">
  <div class="nav-drawer-title">Navigation</div>
  <a href="index.html"><span class="nav-icon">🧮</span> Calculator</a>
  <a href="converter.html"><span class="nav-icon">📐</span> Converter</a>
  <hr class="nav-drawer-divider" />
  <a href="settings.html"><span class="nav-icon">⚙️</span> Settings</a>
  <a href="settings-materials.html"><span class="nav-icon">🪨</span> Material Presets</a>
  <a href="settings-trucks.html"><span class="nav-icon">🚛</span> Truck Defaults</a>
  <a href="settings-rounding.html"><span class="nav-icon">🔢</span> Rounding Rules</a>
  <a href="settings-units.html"><span class="nav-icon">📏</span> Units</a>
</nav>
  </div>

  <script src="settings-store.js"></script>
  <script src="settings-units.js"></script>
  <script>
    const _btn = document.getElementById('hamburgerBtn');
    const _backdrop = document.getElementById('navBackdrop');
    const _drawer = document.getElementById('navDrawer');
    function openNav() { _btn.classList.add('open'); _btn.setAttribute('aria-expanded','true'); _backdrop.classList.add('open'); _drawer.classList.add('open'); }
    function closeNav() { _btn.classList.remove('open'); _btn.setAttribute('aria-expanded','false'); _backdrop.classList.remove('open'); _drawer.classList.remove('open'); }
    _btn.addEventListener('click', () => _btn.classList.contains('open') ? closeNav() : openNav());
    _backdrop.addEventListener('click', closeNav);
    _drawer.querySelectorAll('a').forEach(a => a.addEventListener('click', closeNav));
  </script>
</body>
</html>
